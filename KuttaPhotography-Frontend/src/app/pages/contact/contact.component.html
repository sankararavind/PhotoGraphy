<section class="section pt-150">
  <div class="contact-container">
    <div class="contact-info animate-on-scroll">
      <h1 class="page-title">Get In <span class="highlight">Touch</span></h1>
      <p class="subtitle mb-50">Have a project in mind? Let's create something cinematic together. Fill out the form with your project details.</p>
      
      <div class="info-items">
        <div class="info-item">
          <div class="icon">📍</div>
          <div class="details">
            <h3>Studio Location</h3>
            <p>123 Cinematic Ave, Studio District, LA 90028</p>
          </div>
        </div>
        
        <div class="info-item">
          <div class="icon">📞</div>
          <div class="details">
            <h3>Direct Line</h3>
            <p>+1 (555) 123-4567</p>
          </div>
        </div>
        
        <div class="info-item">
          <div class="icon">✉️</div>
          <div class="details">
            <h3>General Inquiries</h3>
            <p>hello&#64;kuttaphotography.com</p>
          </div>
        </div>
      </div>
    </div>
    
    <div class="contact-form-wrap glass-panel animate-on-scroll" style="animation-delay: 0.2s;">
      <form (ngSubmit)="onSubmit()" #contactForm="ngForm" class="contact-form">
        <div class="success-msg" *ngIf="successMessage">{{successMessage}}</div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="name">Full Name *</label>
            <input type="text" id="name" name="name" [(ngModel)]="contactData.name" required #name="ngModel" [class.invalid]="name.invalid && name.touched">
          </div>
          <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" [(ngModel)]="contactData.email" required email #email="ngModel" [class.invalid]="email.invalid && email.touched">
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="eventType">Inquiry Type *</label>
            <select id="eventType" name="eventType" [(ngModel)]="contactData.eventType" required #eventType="ngModel" [class.invalid]="eventType.invalid && eventType.touched">
              <option value="" disabled>Select a category</option>
              <option value="Wedding / Engagement">Wedding / Engagement</option>
              <option value="Commercial / Branding">Commercial / Branding</option>
              <option value="Portrait / Editorial">Portrait / Editorial</option>
              <option value="Music Video / Short Film">Music Video / Short Film</option>
              <option value="Event Coverage">Event Coverage</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="eventDate">Estimated Date (Optional)</label>
            <input type="date" id="eventDate" name="eventDate" [(ngModel)]="contactData.eventDate">
          </div>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number (Optional)</label>
          <input type="tel" id="phone" name="phone" [(ngModel)]="contactData.phone">
        </div>
        
        <div class="form-group">
          <label for="message">Project Details *</label>
          <textarea id="message" name="message" rows="6" placeholder="Tell us about the scope, location, and your vision..." [(ngModel)]="contactData.message" required #message="ngModel" [class.invalid]="message.invalid && message.touched"></textarea>
        </div>
        
        <button type="submit" class="btn-primary w-100" [disabled]="contactForm.invalid || isSubmitting">
          <span *ngIf="!isSubmitting">Submit Inquiry</span>
          <span *ngIf="isSubmitting" class="loader"></span>
        </button>
      </form>
    </div>
  </div>
</section>
